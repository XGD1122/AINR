name: ainr
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.9
  - pip

  # Deep Learning (choose GPU or CPU version)
  # GPU version (CUDA 11.7):
  - pytorch=1.13.1
  - pytorch-cuda=11.7
  # CPU-only (uncomment and comment the two lines above):
  # - pytorch=1.13.1
  # - cpuonly

  # Core Scientific
  - numpy=1.24.3
  - pandas=2.0.1
  - scipy=1.10.1
  - scikit-learn=1.2.2

  # Visualization
  - matplotlib=3.7.1
  - seaborn=0.12.2
  - notebook=6.5.4
  - jupyter=1.0.0

  # pip packages
  - pip:
    - scanpy==1.9.3
    - anndata==0.9.1
